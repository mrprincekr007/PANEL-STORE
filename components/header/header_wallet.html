<style>

    .balance-digits { font-size: 13px; color: white; font-weight: 900; }

<script>
    window.notifPopupOpen = false;
    window.openNotificationPopup = function() {
        const container = document.getElementById('notification-container');
        if (container && window.notifPopupOpen) {
            container.remove();
            window.notifPopupOpen = false;
            return;
        }
        if (container) container.remove();
        const div = document.createElement('div');
        div.id = 'notification-container';
        document.body.appendChild(div);
        window.notifPopupOpen = true;
        const base = window.location.pathname.includes('/components/menubar/') ? '..' : 'components';
        loadComponentAndRunScripts(base + '/notification.html', 'notification-container');
    };
</script>
<script type="module">
    import { auth, db, ref, onValue, get, onAuthStateChanged } from "./js/firebase-config.js";
    onAuthStateChanged(auth, (user) => {
        const li = document.querySelector('.auth-ui-logged-in');
        const lo = document.querySelector('.auth-ui-logged-out');
        if (user) {
            if (li) li.style.display = 'flex';
            if (lo) lo.style.display = 'none';
            const userRef = ref(db, `users/${user.uid}`);
            onValue(userRef, (snap) => {
                if(snap.exists()) {
                    const el = document.getElementById('headerLiveBalance');
                    if(el) { const b = parseFloat(snap.val().balance || 0); el.setAttribute('data-inr', b); el.textContent = window.formatPriceShort ? window.formatPriceShort(b) : '₹' + b.toFixed(2); }
                }
            });
            onValue(ref(db, `notifications/${user.uid}`), async (snap) => {
                const data = snap.val() || {};
                const items = Object.values(data);
                let unread = items.filter(n => !n.read).length;
                try {
                    const gSnap = await get(ref(db, 'global_alerts/promotions'));
                    if (gSnap.exists()) {
                        const seen = JSON.parse(localStorage.getItem('nexus_seen_global_' + user.uid)) || [];
                        Object.keys(gSnap.val()).forEach(id => { if (!seen.includes(id)) unread++; });
                    }
                } catch(_) {}
                try { if (localStorage.getItem('nexus_welcome_' + user.uid) === '1') unread++; } catch(_) {}
                const badge = document.getElementById('notifBadge');
                if (badge) { badge.textContent = unread; badge.style.display = unread > 0 ? 'flex' : 'none'; }
            });
        } else {
            if (li) li.style.display = 'none';
            if (lo) lo.style.display = 'flex';
        }
    });
</script>

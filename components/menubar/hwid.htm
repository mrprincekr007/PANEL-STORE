<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Core | HWID Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="text-gray-300 font-sans overflow-x-hidden selection:bg-purple-600 selection:text-white pb-32 relative">
    <div class="premium-bg-container">
        <div class="bg-orb bg-orb-1" style="background:#7c3aed;"></div>
        <div class="bg-orb bg-orb-2" style="background:#2563eb;"></div>
        <div class="bg-grid-overlay"></div>
    </div>
    <div id="header-container"></div>
    <main class="w-full max-w-3xl mx-auto px-4 md:px-8 py-6 space-y-6 relative z-10">
        <div class="text-center md:text-left">
            <h1 class="text-2xl md:text-3xl font-black text-white tracking-tight">
                <i class="fas fa-microchip text-purple-400 mr-2 drop-shadow-[0_0_8px_rgba(124,58,237,0.6)]"></i>
                HWID <span class="text-purple-400">Reset</span>
            </h1>
            <p class="text-xs text-gray-500 mt-1">Manage your hardware identifier</p>
        </div>
        <div class="premium-glass-card p-6 md:p-8 relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-48 h-48 bg-purple-500/5 rounded-full blur-3xl pointer-events-none"></div>
            <div class="relative z-10">
                <div id="resetResultContainer" class="mb-4"></div>
                <div>
                    <h3 class="text-xs font-black text-white uppercase tracking-wider mb-1">Reset HWID by Key</h3>
                    <p class="text-[10px] text-gray-500 mb-4">Enter your license key to reset its hardware identifier</p>
                    <div class="flex flex-col sm:flex-row gap-3 mb-3">
                        <input type="text" id="keyInput" class="flex-1 bg-black/60 border border-white/10 rounded-2xl px-5 py-3.5 text-sm text-white font-mono focus:outline-none focus:border-purple-500 focus:shadow-[0_0_15px_rgba(124,58,237,0.2)] transition-all placeholder-gray-600 uppercase" placeholder="Enter your license key (e.g. 9OUH0SII427P)" style="text-transform:uppercase;letter-spacing:0.15em;">
                    </div>
                    <div>
                        <button onclick="resetKeyHwid()" id="hwidSubmitBtn" class="w-full px-6 py-3.5 bg-gradient-to-r from-purple-600 to-blue-500 rounded-2xl font-black text-[10px] uppercase tracking-wider text-white shadow-[0_0_20px_rgba(124,58,237,0.4)] hover:shadow-[0_0_35px_rgba(124,58,237,0.7)] hover:translate-y-[-2px] transition-all duration-300 flex items-center justify-center gap-2 whitespace-nowrap">
                            <i class="fas fa-sync-alt"></i> Reset HWID
                        </button>
                    </div>
                    <div id="keyStatus" class="mt-3 text-[10px] font-mono text-center"></div>
                </div>
            </div>
        </div>
        <div class="premium-glass-card p-6 md:p-8 relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-5">
                    <i class="fas fa-clock-rotate text-purple-400 text-sm"></i>
                    <h3 class="text-xs font-black text-white uppercase tracking-wider">Reset History</h3>
                </div>
                <div id="hwidHistoryContainer">
                    <div class="flex flex-col items-center justify-center py-10 opacity-60">
                        <div class="w-12 h-12 rounded-2xl bg-purple-500/5 border border-purple-500/10 flex items-center justify-center text-purple-500/30 text-xl mb-3">
                            <i class="fas fa-timeline"></i>
                        </div>
                        <p class="text-[10px] font-mono tracking-widest text-gray-500">No reset history</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="dropdown-container"></div>
    <div id="navigation-container"></div>
    <div id="toastContainer" class="fixed top-20 right-4 z-[99999] flex flex-col gap-2 pointer-events-none"></div>
    <script>
        function loadComponentAndRunScripts(url, containerId) {
            fetch(url).then(res => { if(!res.ok) throw new Error('Failed to load '+url); return res.text(); }).then(html => {
                document.getElementById(containerId).innerHTML = html;
                const scripts = document.getElementById(containerId).getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    const ns = document.createElement('script');
                    if (scripts[i].type) ns.type = scripts[i].type;
                    ns.text = scripts[i].innerText;
                    document.body.appendChild(ns);
                }
            }).catch(err => console.error(err));
        }
        loadComponentAndRunScripts('../header/header_menubar.html', 'header-container');
        loadComponentAndRunScripts('../menubar.html', 'dropdown-container');
        loadComponentAndRunScripts('../navigation.html', 'navigation-container');
    </script>
    <style>
        .premium-bg-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -100; background-color: #030305; overflow: hidden; }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.25; animation: orbMove 18s infinite alternate ease-in-out; }
        .bg-orb-1 { width: 50vw; height: 50vw; top: -15%; left: -15%; animation-duration: 22s; animation-name: orbMove, orbPulse1; }
        .bg-orb-2 { width: 60vw; height: 60vw; bottom: -20%; right: -15%; animation-duration: 28s, 7s; animation-direction: alternate-reverse, normal; animation-name: orbMove, orbPulse2; }
        .bg-grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; z-index: -99; animation: gridPan 30s linear infinite; }
        @keyframes orbMove { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(15vw,15vh) scale(1.1); } 66% { transform: translate(-10vw,20vh) scale(0.9); } 100% { transform: translate(10vw,-10vh) scale(1.2); } }
        @keyframes orbPulse1 { 0% { opacity: 0.1; transform: scale(0.8); } 50% { opacity: 0.45; transform: scale(1.3); } 100% { opacity: 0.1; transform: scale(0.8); } }
        @keyframes orbPulse2 { 0% { opacity: 0.4; transform: scale(1.1); } 50% { opacity: 0.1; transform: scale(0.7); } 100% { opacity: 0.4; transform: scale(1.1); } }
        @keyframes gridPan { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }
        .premium-glass-card { background: linear-gradient(145deg, rgba(15,18,25,0.6) 0%, rgba(5,7,10,0.85) 100%); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.05); transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
        .premium-glass-card:hover { border-color: rgba(124,58,237,0.3); box-shadow: 0 20px 45px rgba(0,0,0,0.9); }
        .toast-msg { background: rgba(15,17,24,0.96); border: 1px solid rgba(255,255,255,0.08); padding: 12px 18px; border-radius: 12px; color: #fff; font-size: 12px; font-weight: 500; pointer-events: all; display: flex; align-items: center; gap: 10px; box-shadow: 0 15px 30px rgba(0,0,0,0.8); animation: toastIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) forwards; transition: all 0.3s ease; }
        .toast-msg.success i { color: #00ff66; } .toast-msg.error i { color: #ff2a5f; } .toast-msg.info i { color: #3b82f6; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
    <script type="module">
        import { auth, db, ref, get, update, push, onAuthStateChanged } from "./../../js/firebase-config.js";

        function showToast(msg, type = 'success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast-msg ' + type;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            t.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> <span>${msg}</span>`;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(30px)'; setTimeout(() => t.remove(), 300); }, 2500);
        }

        async function loadHistory(uid) {
            const container = document.getElementById('hwidHistoryContainer');
            try {
                const snap = await get(ref(db, 'users/' + uid + '/hwidHistory'));
                if (!snap.exists()) {
                    container.innerHTML = '<div class="flex flex-col items-center justify-center py-10 opacity-60"><div class="w-12 h-12 rounded-2xl bg-purple-500/5 border border-purple-500/10 flex items-center justify-center text-purple-500/30 text-xl mb-3"><i class="fas fa-timeline"></i></div><p class="text-[10px] font-mono tracking-widest text-gray-500">No reset history</p></div>';
                    return;
                }
                const entries = Object.values(snap.val()).reverse().slice(0, 10);
                let html = '<div class="space-y-2">';
                entries.forEach((e) => {
                    const date = e.date ? new Date(e.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'N/A';
                    const keyDisplay = e.key || 'N/A';
                    html += '<div class="flex items-center justify-between bg-black/30 border border-white/5 rounded-xl px-4 py-3 hover:border-emerald-500/20 transition">'
                        + '<div class="flex items-center gap-3 min-w-0">'
                        + '<div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-400 text-xs shrink-0"><i class="fas fa-check"></i></div>'
                        + '<div class="min-w-0">'
                        + '<div class="flex items-center gap-2">'
                        + '<span class="text-xs font-mono text-gray-200 truncate max-w-[200px] sm:max-w-xs blur-sm hover:blur-none cursor-pointer transition-all duration-200 select-all">' + keyDisplay + '</span>'
                        + '<span class="text-[9px] font-black text-emerald-500 bg-emerald-500/10 px-2 py-0.5 rounded-full uppercase tracking-wider shrink-0">RESET</span>'
                        + '</div>'
                        + '<p class="text-[9px] text-gray-600 mt-0.5">' + date + '</p>'
                        + '</div></div>'
                        + '<button onclick="navigator.clipboard.writeText(\'' + keyDisplay.replace(/'/g, "\\'") + '\').then(()=>showToast(\'Key copied!\')).catch(()=>showToast(\'Failed to copy\',\'error\'))" class="w-7 h-7 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-gray-500 hover:text-emerald-400 hover:border-emerald-500/30 transition shrink-0 ml-2" title="Copy key"><i class="fas fa-copy text-[10px]"></i></button>'
                        + '</div>';
                });
                html += '</div>';
                container.innerHTML = html;
            } catch (e) { container.innerHTML = '<p class="text-xs text-gray-500 text-center py-6">Failed to load history</p>'; }
        }

        window.resetKeyHwid = async function() {
            const keyInput = document.getElementById('keyInput');
            const statusEl = document.getElementById('keyStatus');
            const resultContainer = document.getElementById('resetResultContainer');
            const btn = document.getElementById('hwidSubmitBtn');
            const licenseKey = keyInput.value.trim().toUpperCase();

            if (!licenseKey) { showToast('Enter your license key', 'error'); return; }

            resultContainer.innerHTML = '';
            statusEl.innerHTML = '<span class="text-purple-400">Checking key...</span>';
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            btn.style.pointerEvents = 'none';

            try {
                const user = auth.currentUser;
                if (!user) { showToast('Not authenticated', 'error'); resetBtn(); return; }

                const snap = await get(ref(db, `purchases/${user.uid}`));
                if (!snap.exists()) {
                    statusEl.innerHTML = '<span class="text-rose-400">❌ Key not found in your account</span>';
                    showToast('No keys found in your account', 'error');
                    resetBtn(); return;
                }

                const data = snap.val();
                let foundId = null;

                for (const id in data) {
                    if (data[id].key === licenseKey) {
                        foundId = id;
                        break;
                    }
                }

                if (!foundId) {
                    statusEl.innerHTML = '<span class="text-rose-400">❌ Key not found in your purchases</span>';
                    showToast('Invalid key. This key does not exist in your account.', 'error');
                    resetBtn(); return;
                }

                await update(ref(db, `purchases/${user.uid}/${foundId}`), { hwid: '' });
                await push(ref(db, `users/${user.uid}/hwidHistory`), { hwid: 'RESET', key: licenseKey, date: Date.now() });
                keyInput.value = '';
                statusEl.innerHTML = '';
                const now = new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                resultContainer.innerHTML = '<div class="premium-glass-card p-4 border-emerald-500/30 bg-emerald-500/5">'
                    + '<div class="flex items-center gap-3">'
                    + '<div class="w-10 h-10 rounded-xl bg-emerald-500/15 border border-emerald-500/20 flex items-center justify-center text-emerald-400 text-sm shrink-0"><i class="fas fa-check-circle"></i></div>'
                    + '<div class="min-w-0">'
                    + '<p class="text-[10px] font-black text-emerald-400 uppercase tracking-wider mb-0.5">HWID Reset Successful</p>'
                    + '<p class="text-xs font-mono text-gray-200 truncate max-w-[250px] sm:max-w-sm select-all">' + licenseKey + '</p>'
                    + '<p class="text-[9px] text-gray-600 mt-0.5">' + now + '</p>'
                    + '</div></div></div>';
                showToast('HWID reset successfully for your key!');
                loadHistory(user.uid);
            } catch (e) {
                statusEl.innerHTML = '<span class="text-rose-400">❌ Error: ' + e.message + '</span>';
                showToast('Error: ' + e.message, 'error');
            }
            resetBtn();

            function resetBtn() {
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Reset HWID';
                btn.style.pointerEvents = 'auto';
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            loadHistory(user.uid);
        });
    </script>
</body>
</html>

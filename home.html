<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Core | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/i18n.js"></script>
    <link rel="stylesheet" href="css/home.css">
</head>
<body class="text-gray-300 font-sans overflow-x-hidden selection:bg-rose-600 selection:text-white pb-32 relative">

    <div class="premium-bg-container">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-grid-overlay"></div>
    </div>

    <div id="header-container"></div>

    <main class="w-full max-w-7xl mx-auto px-4 md:px-8 py-6 flex flex-col gap-6 md:gap-8 relative z-10">

        <!-- ANNOUNCEMENT BANNER -->
        <div id="announcementContainer" style="display:none;">
            <div class="announcement-banner">
                <div class="announcement-icon">
                    <i class="fas fa-bullhorn"></i>
                </div>
                <div class="announcement-content">
                    <span class="announcement-label">ANNOUNCEMENT</span>
                    <p id="announcementText" class="announcement-text"></p>
                </div>
            </div>
        </div>

        <!-- SECTION 1: WELCOME + BALANCE -->
        <section class="animate-on-view" data-delay="0">
            <div class="premium-glass-card p-5 md:p-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-48 h-48 bg-rose-500/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
                <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>
                <div class="flex flex-col md:flex-row justify-between items-stretch md:items-center gap-4 relative z-10">
                    <div class="flex items-center gap-3 md:gap-4">
                        <div class="w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-gradient-to-br from-rose-500 to-purple-600 flex items-center justify-center text-xl md:text-2xl font-black text-white shadow-[0_0_25px_rgba(225,29,72,0.4)] animate-float shrink-0" id="homeAvatar">U</div>
                        <div class="min-w-0">
                            <p class="text-[9px] md:text-[10px] font-black uppercase tracking-[3px] text-gray-500 animate-slide-right" style="animation-delay:0.1s" data-i18n="welcomeBack">Welcome Back,</p>
                            <h2 class="text-lg md:text-2xl font-black text-white tracking-tight truncate animate-slide-right" style="animation-delay:0.2s" id="homeUserName">Client</h2>
                            <p class="text-[9px] md:text-[10px] font-mono text-gray-600 mt-0.5 truncate animate-slide-right" style="animation-delay:0.3s" id="homeUserEmail">Loading...</p>
                        </div>
                    </div>
                    <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full md:w-auto">
                        <div class="bg-gradient-to-br from-[#0f131a] to-[#07090e] border border-white/5 rounded-2xl px-5 py-3.5 animate-scale-in flex items-center gap-3 md:gap-4 shadow-[inset_0_1px_0_rgba(255,255,255,0.05)]" style="animation-delay:0.4s">
                            <div class="w-10 h-10 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400 text-sm shrink-0">
                                <i class="fas fa-wallet"></i>
                            </div>
                            <div>
                                <p class="text-[7px] font-black uppercase tracking-[2px] text-gray-500">Available Balance</p>
                                <p class="text-xl md:text-2xl font-black text-white font-mono tracking-tight leading-tight">
                                    <span id="homeBalance" class="animate-count" data-inr="0">₹0.00</span>
                                </p>
                            </div>
                        </div>
                        <button onclick="window.location.href='wallet.html'" class="animate-scale-in shrink-0" style="animation-delay:0.5s">
                            <div class="px-5 md:px-7 py-3.5 bg-gradient-to-r from-rose-600 to-rose-500 rounded-2xl font-black text-[10px] md:text-[11px] uppercase tracking-wider text-white shadow-[0_0_20px_rgba(225,29,72,0.4)] hover:shadow-[0_0_35px_rgba(225,29,72,0.7)] hover:translate-y-[-2px] transition-all duration-300 flex items-center gap-2 cursor-pointer h-full whitespace-nowrap">
                                <i class="fas fa-plus-circle"></i> ADD FUNDS
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECTION 2: QUICK STATS -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 animate-on-view" data-delay="0.15">
            <div class="stat-card" data-delay="0.1">
                <div class="stat-icon bg-emerald-500/10 text-emerald-400 border-emerald-500/20"><i class="fas fa-shopping-bag"></i></div>
                <div class="stat-info">
                    <p class="stat-label">Purchases</p>
                    <p class="stat-value"><span id="statPurchases" class="animate-count">0</span></p>
                </div>
            </div>
            <div class="stat-card" data-delay="0.2">
                <div class="stat-icon bg-blue-500/10 text-blue-400 border-blue-500/20"><i class="fas fa-indian-rupee-sign"></i></div>
                <div class="stat-info">
                    <p class="stat-label">Total Spent</p>
                    <p class="stat-value"><span id="statSpent" class="animate-count" data-inr="0">₹0</span></p>
                </div>
            </div>
            <div class="stat-card" data-delay="0.3">
                <div class="stat-icon bg-purple-500/10 text-purple-400 border-purple-500/20"><i class="fas fa-key"></i></div>
                <div class="stat-info">
                    <p class="stat-label">Active Keys</p>
                    <p class="stat-value"><span id="statKeys" class="animate-count">0</span></p>
                </div>
            </div>
            <div class="stat-card" data-delay="0.4">
                <div class="stat-icon bg-amber-500/10 text-amber-400 border-amber-500/20"><i class="fas fa-calendar-day"></i></div>
                <div class="stat-info">
                    <p class="stat-label">Member Since</p>
                    <p class="stat-value text-[11px] font-mono font-bold" id="statMemberSince">Today</p>
                </div>
            </div>
        </section>

        <!-- SECTION 3: QUICK ACTIONS -->
        <section class="animate-on-view" data-delay="0.3">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 md:gap-4">
                <button onclick="window.location.href='store.html'" class="quick-action-btn" style="animation-delay:0.1s">
                    <div class="qa-icon bg-rose-500/10 text-rose-400 border-rose-500/20"><i class="fas fa-store"></i></div>
                    <span>Store</span>
                </button>
                <button onclick="window.location.href='wallet.html'" class="quick-action-btn" style="animation-delay:0.2s">
                    <div class="qa-icon bg-emerald-500/10 text-emerald-400 border-emerald-500/20"><i class="fas fa-wallet"></i></div>
                    <span>Wallet</span>
                </button>
                <button onclick="window.location.href='profile.html'" class="quick-action-btn" style="animation-delay:0.3s">
                    <div class="qa-icon bg-blue-500/10 text-blue-400 border-blue-500/20"><i class="fas fa-user-astronaut"></i></div>
                    <span>Profile</span>
                </button>
                <button onclick="window.location.href='support.html'" class="quick-action-btn" style="animation-delay:0.4s">
                    <div class="qa-icon bg-purple-500/10 text-purple-400 border-purple-500/20"><i class="fas fa-headset"></i></div>
                    <span>Support</span>
                </button>
            </div>
        </section>

        <!-- SECTION 4: FEATURED PANELS -->
        <section class="animate-on-view" data-delay="0.45">
            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="section-title"><i class="fas fa-fire text-rose-500 mr-2"></i> Featured Panels</h3>
                <a href="store.html" class="text-[9px] font-black uppercase tracking-wider text-rose-400 hover:text-rose-300 transition flex items-center gap-1">View All <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="flex overflow-x-auto gap-4 pb-3 no-scrollbar snap-x snap-mandatory" id="featuredPanelContainer">
                <div class="snap-center shrink-0 w-[75%] md:w-[30%] h-36 bg-[#0a0c12] border border-gray-800 rounded-2xl flex flex-col justify-center items-center opacity-50">
                    <i class="fas fa-circle-notch fa-spin text-rose-500 text-2xl mb-2"></i>
                    <p class="text-[9px] font-mono tracking-widest uppercase text-gray-500">Loading...</p>
                </div>
            </div>
        </section>

        <!-- SECTION 5: RECENT PURCHASES -->
        <section class="animate-on-view" data-delay="0.6" id="recentPurchasesSection">
            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="section-title"><i class="fas fa-clock-rotate text-emerald-400 mr-2"></i> Recent Purchases</h3>
            </div>
            <div id="recentPurchasesContainer">
                <div class="premium-glass-card p-8 flex flex-col items-center justify-center opacity-60">
                    <i class="fas fa-box-open text-3xl text-gray-700 mb-3"></i>
                    <p class="text-[10px] font-mono tracking-widest uppercase text-gray-500">No purchases yet</p>
                    <a href="store.html" class="text-[10px] font-black text-rose-400 mt-2 hover:text-rose-300 transition">Browse Store →</a>
                </div>
            </div>
        </section>

        <!-- SECTION 6: PROMOTIONS -->
        <section class="animate-on-view" data-delay="0.75">
            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="section-title"><i class="fas fa-bullhorn text-amber-400 mr-2"></i> Active Promotions</h3>
            </div>
            <div id="promotionsContainer">
                <div class="premium-glass-card p-8 flex flex-col items-center justify-center opacity-60">
                    <i class="fas fa-tags text-3xl text-gray-700 mb-3"></i>
                    <p class="text-[10px] font-mono tracking-widest uppercase text-gray-500">No promotions active</p>
                </div>
            </div>
        </section>

    </main>

    <div id="dropdown-container"></div>
    <div id="navigation-container"></div>

    <script>
        function loadComponentAndRunScripts(url, containerId) {
            fetch(url).then(res => res.text()).then(html => {
                document.getElementById(containerId).innerHTML = html;
                const scripts = document.getElementById(containerId).getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    const newScript = document.createElement('script');
                    if (scripts[i].type) newScript.type = scripts[i].type;
                    newScript.text = scripts[i].innerText;
                    document.body.appendChild(newScript);
                }
            }).catch(err => console.error(err));
        }
        loadComponentAndRunScripts('./components/header/header_home.html', 'header-container');
        loadComponentAndRunScripts('./components/menubar.html', 'dropdown-container');
        loadComponentAndRunScripts('./components/navigation.html', 'navigation-container');
    </script>

    <script type="module" src="js/home.js"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>

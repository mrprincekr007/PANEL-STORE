<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Core | Storefront</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="js/i18n.js"></script>
    <link rel="stylesheet" href="css/store.css">
</head>
<body>

    <div class="premium-bg-container">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-grid-overlay"></div>
    </div>

    <div id="header-container"></div>

    <main class="w-full max-w-7xl mx-auto px-4 md:px-8 xl:px-12 py-8 xl:py-12 relative z-10">
        
        <div class="store-header">
            <h1>Payload Modules</h1>
            <p>Select scripts matching your target architecture</p>
        </div>

        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search panels, features...">
        </div>

        <div class="store-toolbar">
            <div class="category-chips no-scrollbar" id="categoryChipsContainer">
                <button class="category-chip active" onclick="filterStore('All')">
                    <i class="fas fa-layer-group"></i> All Items
                </button>
            </div>
        </div>


        <div class="products-grid" id="storeProductsGrid">
            <div id="storeLoader" class="empty-state" style="padding:80px 20px;">
                <div class="spinner" style="width:48px;height:48px;margin-bottom:20px;"></div>
                <h3>Syncing Database</h3>
                <p>Connecting to secure nodes...</p>
            </div>
        </div>

    </main>

    <!-- CHECKOUT MODAL -->
    <div class="modal-overlay hidden" id="modalCheckout">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-shopping-cart" style="color:#e11d48;"></i> Checkout</h3>
                <button class="modal-close" onclick="closeCheckoutModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="checkout-row"><span>Item:</span><strong id="chkPanelName">-</strong></div>
                <div class="checkout-row"><span>Plan:</span><strong id="chkPlanLabel" style="color:#f59e0b;">-</strong></div>
                <div class="checkout-row"><span>Price:</span><strong><span id="chkPrice" data-inr="0">₹0.00</span></strong></div>
                <div class="checkout-total">
                    <span>To Pay:</span>
                    <div>
                        <span id="chkStrike" class="strike-price hidden" data-inr="0">₹0.00</span>
                        <span><span id="chkFinalPrice" data-inr="0">₹0.00</span></span>
                    </div>
                </div>
            </div>
            <div class="coupon-section">
                <div class="coupon-header">
                    <span>Promo Code</span>
                    <span id="chkBadge" class="discount-badge hidden">0% OFF</span>
                </div>
                <div class="coupon-box">
                    <input type="text" id="couponInput" placeholder="Enter code" maxlength="20">
                    <button class="coupon-apply-btn" id="btnApplyCoupon">APPLY</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeCheckoutModal()">CANCEL</button>
                <button class="btn btn-primary" id="btnConfirmPay" onclick="executePurchase()">CONFIRM PAY</button>
            </div>
        </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div class="modal-overlay hidden" id="modalSuccess">
        <div class="modal" style="text-align:center;">
            <i class="fas fa-check-circle success-icon"></i>
            <h3 class="success-title">PURCHASE SUCCESSFUL</h3>
            <p class="success-sub">Your license key is ready for use.</p>
            <div class="key-box" onclick="copySuccessKey()" title="Click to copy license key">
                <span class="key-label">License Key</span>
                <strong class="key-value" id="successKey">XXXXXX</strong>
            </div>
            <div class="modal-actions" style="margin-top:20px;">
                <button class="btn btn-primary" id="btnAccessTool"><i class="fas fa-download"></i> ACCESS</button>
                <button class="btn btn-outline" onclick="closeModalSuccess()">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="storeLoaderOverlay" class="loader-overlay hidden"><div class="spinner"></div></div>
    <div id="dropdown-container"></div>
    <div id="navigation-container"></div>
    
    <script>
        function loadComponentAndRunScripts(url, containerId) {
            fetch(url).then(res => {
                if(!res.ok) throw new Error(`Failed to load ${url}`);
                return res.text();
            }).then(html => {
                document.getElementById(containerId).innerHTML = html;
                const scripts = document.getElementById(containerId).getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    const newScript = document.createElement('script');
                    if (scripts[i].type) newScript.type = scripts[i].type;
                    newScript.text = scripts[i].innerText;
                    document.body.appendChild(newScript);
                }
            }).catch(err => console.error(err));
        }

        loadComponentAndRunScripts('./components/header/header_store.html', 'header-container');
        loadComponentAndRunScripts('./components/menubar.html', 'dropdown-container');
        loadComponentAndRunScripts('./components/navigation.html', 'navigation-container');
    </script>

    <script type="module" src="js/store.js"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>
